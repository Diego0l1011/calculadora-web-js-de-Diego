<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Científica con Clima</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2ecc71,#a8e6a3);
    padding:20px;
}

.calculadora{
    background:white;
    width:400px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    border:2px solid #2ecc71;
}

h1,h2{
    text-align:center;
    margin-bottom:15px;
    color:#2ecc71;
}

#pantalla{
    width:100%;
    height:60px;
    font-size:24px;
    text-align:right;
    padding:10px;
    border:2px solid #2ecc71;
    border-radius:10px;
    margin-bottom:15px;
    outline:none;
}

.botones{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

.botones button{
    background:#2ecc71;
    color:white;
}

.borrar{
    width:100%;
    margin-top:10px;
    background:#27ae60;
    color:white;
}

ul{
    max-height:150px;
    overflow-y:auto;
    padding-left:20px;
}

li{
    margin:5px 0;
}

#clima{
    margin-top:15px;
    background:#f5fff7;
    border:1px solid #2ecc71;
    border-radius:10px;
    padding:10px;
}
</style>

</head>
<body>

<div class="calculadora">

    <h1>🧮 Calculadora Científica</h1>

    <input type="text" id="pantalla" readonly>

    <div class="botones">
        <button onclick="raiz()">√</button>
        <button onclick="cuadrado()">x²</button>
        <button onclick="porcentaje()">%</button>
        <button onclick="limpiar()">C</button>

        <button onclick="agregar('7')">7</button>
        <button onclick="agregar('8')">8</button>
        <button onclick="agregar('9')">9</button>
        <button onclick="agregar('/')">÷</button>

        <button onclick="agregar('4')">4</button>
        <button onclick="agregar('5')">5</button>
        <button onclick="agregar('6')">6</button>
        <button onclick="agregar('*')">×</button>

        <button onclick="agregar('1')">1</button>
        <button onclick="agregar('2')">2</button>
        <button onclick="agregar('3')">3</button>
        <button onclick="agregar('-')">−</button>

        <button onclick="agregar('0')">0</button>
        <button onclick="agregar('.')">.</button>
        <button onclick="calcular()">=</button>
        <button onclick="agregar('+')">+</button>
    </div>

    <h2>Historial</h2>

    <ul id="historial"></ul>

    <button class="borrar" onclick="borrarHistorial()">
        Borrar Historial
    </button>

    <h2>🌤️ Clima Actual</h2>

    <button class="borrar" onclick="obtenerClima()">
        Obtener Clima
    </button>

    <div id="clima">
        Presiona el botón para consultar el clima.
    </div>

</div>

<script>

const pantalla = document.getElementById("pantalla");

let historial = JSON.parse(localStorage.getItem("historial")) || [];

mostrarHistorial();

function agregar(valor){
    pantalla.value += valor;
}

function limpiar(){
    pantalla.value = "";
}

function calcular(){
    try{
        let operacion = pantalla.value;
        let resultado = eval(operacion);

        guardarOperacion(`${operacion} = ${resultado}`);

        pantalla.value = resultado;
    }
    catch{
        pantalla.value = "Error";
    }
}

function raiz(){
    let numero = Number(pantalla.value);

    let resultado = Math.sqrt(numero);

    guardarOperacion(`√${numero} = ${resultado}`);

    pantalla.value = resultado;
}

function cuadrado(){
    let numero = Number(pantalla.value);

    let resultado = numero * numero;

    guardarOperacion(`${numero}² = ${resultado}`);

    pantalla.value = resultado;
}

function porcentaje(){
    let numero = Number(pantalla.value);

    let resultado = numero / 100;

    guardarOperacion(`${numero}% = ${resultado}`);

    pantalla.value = resultado;
}

function guardarOperacion(op){

    historial.unshift(op);

    if(historial.length > 10){
        historial.pop();
    }

    localStorage.setItem(
        "historial",
        JSON.stringify(historial)
    );

    mostrarHistorial();
}

function mostrarHistorial(){

    const lista =
    document.getElementById("historial");

    lista.innerHTML = "";

    historial.forEach(op => {

        lista.innerHTML += `<li>${op}</li>`;

    });
}

function borrarHistorial(){

    historial = [];

    localStorage.removeItem("historial");

    mostrarHistorial();
}

/* ===========================
   API DEL CLIMA
=========================== */

const API_KEY = "78bb99c31c5d73d73219aeffd234100e";

function obtenerClima(){

    const clima =
    document.getElementById("clima");

    clima.innerHTML =
    "Obteniendo ubicación...";

    if(navigator.geolocation){

        navigator.geolocation.getCurrentPosition(

            async function(posicion){

                const lat =
                posicion.coords.latitude;

                const lon =
                posicion.coords.longitude;

                try{

                    const respuesta =
                    await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=es`
                    );

                    const datos =
                    await respuesta.json();

                    clima.innerHTML = `
                        <p><strong>📍 Ciudad:</strong> ${datos.name}</p>
                        <p><strong>🌡️ Temperatura:</strong> ${datos.main.temp} °C</p>
                        <p><strong>🤔 Sensación:</strong> ${datos.main.feels_like} °C</p>
                        <p><strong>☁️ Estado:</strong> ${datos.weather[0].description}</p>
                        <p><strong>💧 Humedad:</strong> ${datos.main.humidity}%</p>
                    `;

                }

                catch(error){

                    clima.innerHTML =
                    "Error al obtener el clima.";

                }

            },

            function(){

                clima.innerHTML =
                "Debes permitir la ubicación.";

            }

        );

    }

    else{

        clima.innerHTML =
        "Tu navegador no soporta geolocalización.";

    }

}

</script>

</body>
</html>
